<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Login to CropLynk – Smart farming platform for real-time weather, AI crop guidance, and direct market access." />
  <title>Login – CropLynk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,700;1,9..144,300&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

  <style>
    body {
      background: var(--green-50);
      background-image: radial-gradient(var(--green-100) 1px, transparent 1px);
      background-size: 20px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 1rem;
    }

    .auth-page-container {
      width: 100%;
      max-width: 420px;
      background: var(--white);
      border-radius: var(--border-r-lg);
      box-shadow: var(--shadow-xl);
      padding: 2.5rem 2rem;
      text-align: center;
      position: relative;
    }

    .auth-back-home {
      position: absolute;
      top: 1rem;
      left: 1rem;
      text-decoration: none;
      color: var(--gray-500);
      font-size: 1.2rem;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: all var(--transition-fast);
      background: var(--gray-50);
      border: 1px solid var(--gray-200);
    }

    .auth-back-home:hover {
      background: var(--gray-100);
      color: var(--gray-800);
    }
  </style>
</head>

<body>

  <div class="auth-page-container glass-card" id="authModal">
    <a href="index.html" class="auth-back-home" aria-label="Back to home">←</a>
    <!-- Step 1: Google Login -->
    <div class="auth-step" id="authStepLogin">
      <div class="auth-modal-icon">🌾</div>
      <h3 id="authModalTitle" data-i18n="auth_title">Welcome to CropLynk</h3>
      <p class="auth-modal-sub" data-i18n="auth_sub">Login with Google to continue to your dashboard</p>

      <button class="btn btn-full google-auth-btn" id="googleSignInBtn">
        <svg viewBox="0 0 24 24" width="20" height="20">
          <path fill="#4285F4"
            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
          <path fill="#34A853"
            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.16v2.84C3.99 20.53 7.7 23 12 23z" />
          <path fill="#FBBC05"
            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.16C1.43 8.55 1 10.22 1 12s.43 3.45 1.16 4.93l2.85-2.22.83-.62z" />
          <path fill="#EA4335"
            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.16 7.07l3.68 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
        </svg>
      </button>

      <p class="auth-disclaimer" data-i18n="auth_disclaimer">By continuing, you agree to our Terms of Service &amp;
        Privacy Policy.</p>
    </div>
    <div class="auth-step" id="authStepSuccess" style="display:none;">
      <div class="auth-success-check">
        <svg viewBox="0 0 52 52" width="56" height="56">
          <circle cx="26" cy="26" r="25" fill="none" stroke="var(--green-400)" stroke-width="2"
            class="auth-check-circle" />
          <path fill="none" stroke="var(--green-500)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"
            d="M14 27l8 8 16-16" class="auth-check-mark" />
        </svg>
      </div>
      <h3 data-i18n="auth_success_title">Welcome, Kisan! 🌾</h3>
      <p class="auth-modal-sub" data-i18n="auth_success_sub">You are now logged in successfully.</p>
    </div>
  </div>

  <!-- Toast notification -->
  <div class="toast" id="toast" role="alert" aria-live="assertive"></div>

  <script src="script.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
</body>

</html>
